name: "✨ 機能追加・改善提案"
description: 新機能のリクエストや既存機能の改善を提案する
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        提案ありがとうございます。背景と目的を明確にすると議論がスムーズになります。

  - type: dropdown
    id: package
    attributes:
      label: 対象パッケージ
      options:
        - server
        - pc-client
        - mobile-client
        - 複数 / 全体
        - 未定
    validations:
      required: true

  - type: dropdown
    id: type
    attributes:
      label: 種別
      options:
        - 新機能
        - 既存機能の改善
        - パフォーマンス改善
        - DX改善（開発体験）
        - その他
    validations:
      required: true

  - type: textarea
    id: motivation
    attributes:
      label: 背景・課題
      description: なぜこの機能が必要か、現状の何が問題かを説明してください
      placeholder: 例）スマホの傾き検出がノイズで不安定なため、ベイ操作に滑らかさが出ない
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: 提案内容
      description: 具体的にどう実装・改善するかを説明してください
      placeholder: 例）センサー値にローパスフィルタ（α=0.1）を適用し、急激な変化を抑える
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 検討した代替案
      placeholder: 例）カルマンフィルタも検討したが実装コストが高いため除外

  - type: textarea
    id: notes
    attributes:
      label: その他・補足
